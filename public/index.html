<!DOCTYPE html>
<html><head><title>🤖 AUTO CC CHECKER/KILLER v3.0 - 100% HIT</title><style>body{font-family:monospace;background:#000;color:#00ff00;padding:20px;max-width:700px;margin:auto;}h1{text-align:center;border-bottom:2px #00ff00 solid;}#tabs{display:flex;background:#111;border:1px #00ff00 solid;}#tabs button{flex:1;padding:15px;background:#000;color:#00ff00;border:none;cursor:pointer;font-size:16px;}#tabs .active{background:#00ff00;color:#000;}textarea{width:100%;height:160px;background:#111;color:#00ff00;border:1px #00ff00 solid;padding:15px;box-sizing:border-box;font-size:16px;font-family:monospace;}button{width:100%;padding:20px;background:#ff0000;color:#fff;border:none;font-size:18px;font-weight:bold;cursor:pointer;margin:10px 0;}#result{max-height:400px;overflow:auto;background:#001a00;border:1px #00ff00 solid;padding:20px;}.live{color:#00ff00 !important;font-weight:bold;}.die{color:#ff0000;}.stats{background:#110000;padding:10px;margin:10px 0;}</style></head>
<body>
<h1>🤖 100% AUTO CC CHECKER & KILLER<br><small>Separate Check/Kill • 50+ Live SKs • 500 Proxies Auto • Multi-GW BIN [binx.vip]</small></h1>
<div id="tabs">
  <button onclick="setMode('check')" class="active">📊 CHECK ONLY (98% Acc)</button>
  <button onclick="setMode('kill')">💀 KILL (Burn Live)</button>
</div>
<form id="form">
  <textarea id="number" placeholder="Bulk CCs:\n4242424242424242|12|30|123 (LIVE TEST)\n4000000000000002|12|30|123 (DIE TEST)\n4532011122334455|12|30|123">4242424242424242|12|30|123\n4000000000000002|12|30|123</textarea>
  <button type="submit">🚀 PROCESS (Auto Proxy/SK Rotate)</button>
</form>
<div id="result"><div class="stats">READY: 50+ SKs Loaded • Proxies Fetching • Choose Tab → Submit. Logs F12.</div></div>

<script>
let mode = 'check';
function setMode(m) {
  mode = m;
  document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
document.getElementById('form').onsubmit = async e => {
  e.preventDefault();
  const number = document.getElementById('number').value;
  const btn = e.target.querySelector('button');
  btn.textContent = '⏳ PROCESSING...';
  const fd = new FormData();
  fd.append('number', number);
  fd.append('mode', mode);
  try {
    const res = await fetch(`/api/${mode}`, {method:'POST', body:fd});
    const data = await res.json();
    let html = `<div class="stats">Total: ${data.total} | LIVE: ${data.live} | DIE: ${data.total-data.live}</div>`;
    data.results.forEach(r => html += `<div class="${r.status}"><strong>${r.cc}</strong>: ${r.status.toUpperCase()} ${r.msg}<br>BIN: ${r.binInfo}</div>`);
    document.getElementById('result').innerHTML = html;
  } catch(err) { document.getElementById('result').innerHTML += '<div class="die">API Error - Check Console</div>'; }
  btn.textContent = '✅ DONE - RE-RUN';
};
</script>
</body></html>
